# Ingredient cards filtered to IngredientCards.md §2: only Names with Deck > 0.
# Every Type has at least one generic card (name = category) for layout / print preview; some may
# not appear in the shipped deck per rulebook suggested counts (—), but the card exists in data.
# fields.name = fields.category for generic rows. Generic ids: {type-kebab}-generic.
# sell_value = market_price - 1.
#
# Market price: **default 1–3** from **deck_count** (rulebook §2 **Deck** / **Gen**) when deck_count ≥ 2:
# **1** if deck_count ≥ 6; **2** if 2–5. **Really low deck** (deck_count ≤ 1 dedicated Name): use **Sig** / **Core**
# from IngredientCards.md — **Sig == 0** (Core only) → **≤ 3**; **Sig ≥ 1** and **Core > Sig** (★ + non-★ lines) → **4**;
# **Sig == Core** (every menu hit is ★) → **5**. **Generic** rows (name = Type; deck_count 0 or flex) → **≤ 3**.
# sell_value = market_price - 1.

