# Menus aligned with Cook-food-cardgame rulebook MenuCards.md (*In Play* list).
# type_id matches Card-Maker schema id menu / menu_2.
# inner_color: print decks use #fff7ed for menu inner panel.
#
# ingredients rows:
#   slot: short label (a11y; Core order matches rulebook)
#   requirement: printed for Signature lines on Menu_2; Core is icon-led
#   icon: slug for SVG (see Menu_2 menu2-icon-ring)
#   signature: true = ★ perfect Name line
# Style: no bracketed effect refs in requirements; no ellipsis; ANY for open lists.
# Effect blurbs (normal_effect / perfect_effect): full words (no “I” for Ingredient); plain
# English sentences, not code (e.g. “no more than 2” not “≤2 I”).
# Persistent coin: “For the rest of the game, each Gather, gain N extra base coin(s)” — stacks (Effects.md).

- type_id: menu
  id: tom-yum
  fields:
    name: Tom Yum
    grade: 3
    ingredients:
      - slot: Spice base
        icon: chili-curry-paste
        requirement: Chillies OR Curry paste
      - slot: Aromatics
        icon: aromatics
        signature: true
        requirement: Galangal OR Lemongrass OR Kaffir lime
      - slot: Sour agents
        icon: tamarind-lime
        signature: true
        requirement: Lime
      - slot: Terrestrial / Aquatic protein
        icon: meat-poultry
        requirement: Chicken OR Pork OR Shrimp OR Fish OR Squid
    normal_vp: 4
    normal_effect: Draw 1 ingredient
    normal_effect_id: E-DRAW-1
    perfect_vp: 6
    perfect_effect: Draw 1 ingredient, then choose an opponent; they discard 1 ingredient from hand (their choice)
