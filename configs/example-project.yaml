name: example-weapon-project
data_dir: "./data/example"
template_dir: "./template/example/html"
image_dir: "./template/example/img"
output_dir: "./output/example"

# PNG clip (CSS px) — must match outer card box in example templates (65×95 mm style).
default_viewport_width: 245.67
default_viewport_height: 359.05
default_output_scale: 2

# Reference data (not card types). Loaded once and passed to all templates.
reference_data:
  effects: "effects.yaml"

card_types:
  - id: weapon_frame
    template: "WeaponFrame.html"
    data_files:
      - "weapon_frames.yaml"
    render: true
    fields:
      - name: name
        type: string
        required: true
      - name: type
        type: string
        required: true
      - name: damage
        type: int
        required: false
      - name: fire_rate
        type: int
        required: false
      - name: accuracy
        type: int
        required: false
      - name: max_range
        type: int
        required: false
      - name: ammo_per_mag
        type: int
        required: false

  - id: weapon_part
    template: "WeaponPart.html"
    data_files:
      - "weapon_parts.yaml"
    render: true
    fields:
      - name: name
        type: string
        required: true
      - name: manufacturer
        type: string
        required: false
      - name: type
        type: string
        required: true
      - name: damage
        type: int
        required: false
      - name: fire_rate
        type: int
        required: false
      - name: accuracy
        type: int
        required: false
      - name: min_range
        type: int
        required: false
      - name: max_range
        type: int
        required: false
      - name: ammo_per_mag
        type: int
        required: false
      - name: price
        type: int
        required: false
      - name: compatibles
        type: string_list
        required: false
      - name: tags
        type: string_list
        required: false
      - name: effects
        type: string_list
        required: false

  - id: item
    template: "Item.html"
    data_files:
      - "items.yaml"
    render: true
    fields:
      - name: name
        type: string
        required: true
      - name: usage_limit
        type: int
        required: false
      - name: price
        type: int
        required: false
      - name: usage_boxes
        type: int_list
        required: false
      - name: effects
        type: string_list
        required: false

