        type: string
        required: false
      - name: center_type_align
        type: string
        required: false
      - name: market_price
        type: int
        required: false
      - name: sell_value
        type: int
        required: false
  - id: ingredient_4
    template: "Ingredient_4.html"
    data_files:
      - "ingredients.yaml"
    render: true
    fields:
      - name: name
        type: string
        required: true
      - name: category
        type: string
        required: true
      - name: description
        type: string
        required: false
      - name: flavor_text
        type: string
        required: false
      - name: icon
        type: string
        required: false
      - name: circle_color
        type: string
        required: false
      - name: inner_color
