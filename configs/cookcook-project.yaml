      - name: center_type_align
        type: string
        required: false
      - name: market_price
        type: int
        required: false
      - name: sell_value
        type: int
        required: false
  - id: menu
    template: "Menu.html"
    data_files:
      - "menus.yaml"
    render: true
    fields:
      - name: name
        type: string
        required: true
      - name: grade
        type: int
        required: true
      # ingredients: list of rows { slot, requirement, icon?, signature? } — icon keys match Ingredient SVGs
      - name: ingredients
        type: list
        required: true
      - name: normal_vp
        type: int
        required: true
      - name: normal_effect
        type: string
        required: true
      - name: normal_effect_id
        type: string
        required: false
