        type: int
        required: true
      - name: perfect_effect
        type: string
        required: true
      - name: perfect_effect_id
        type: string
        required: false
      - name: flavor_text
        type: string
        required: true
      - name: icon
        type: string
        required: false
      - name: circle_color
        type: string
        required: false
      - name: inner_color
        type: string
        required: false
      - name: title_align
        type: string
        required: false
  - id: menu_2
    template: "Menu_2.html"
    data_files:
      - "menus.yaml"
    render: true
    fields:
      - name: name
        type: string
        required: true
      - name: grade
        type: int
        required: true
      # rows: { slot, requirement, icon?, signature? } — Menu_2 shows icon + ★; omit icon to fall back to slot text
      - name: ingredients
        type: list
        required: true
      - name: normal_vp
        type: int
        required: true
      - name: normal_effect
        type: string
        required: true
      - name: normal_effect_id
        type: string
        required: false
      - name: perfect_vp
        type: int
        required: true
